<svg width="900" height="1080" viewBox="0 0 900 1080" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#111111">MolecularML Platform — Architecture</text>

  <!-- ── TIER 1: GitHub ── -->
  <rect x="30" y="58" width="840" height="100" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="450" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Developer pushes to GitHub (master)</text>
  <text x="450" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">git push → triggers CI/CD Pipeline · GitHub Secrets: HF_TOKEN · HF_USERNAME · VERCEL_TOKEN · VITE_API_URL</text>

  <!-- arrows down to CI -->
  <line x1="220" y1="158" x2="220" y2="192" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="158" x2="450" y2="192" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="158" x2="680" y2="192" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── TIER 2: GitHub Actions ── -->
  <rect x="30" y="192" width="840" height="140" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="450" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">GitHub Actions — CI/CD Pipeline</text>

  <!-- test-backend -->
  <rect x="58" y="234" width="224" height="76" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="170" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">test-backend</text>
  <text x="170" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">pytest · syntax checks</text>
  <text x="170" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Python 3.11</text>

  <!-- test-frontend -->
  <rect x="338" y="234" width="224" height="76" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="450" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">test-frontend</text>
  <text x="450" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">npm install · vite build</text>
  <text x="450" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Node 20</text>

  <!-- deploy jobs -->
  <rect x="618" y="234" width="224" height="76" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="730" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">deploy jobs</text>
  <text x="730" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">runs after tests pass</text>
  <text x="730" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">deploy-backend + deploy-frontend</text>

  <!-- arrows between CI boxes -->
  <line x1="282" y1="272" x2="336" y2="272" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
  <line x1="562" y1="272" x2="616" y2="272" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

  <!-- arrows down to deploy tier -->
  <line x1="220" y1="332" x2="220" y2="372" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="332" x2="680" y2="372" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── TIER 3: Deployment ── -->
  <!-- HuggingFace Spaces -->
  <rect x="30" y="372" width="400" height="110" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="230" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#042C53">HuggingFace Spaces</text>
  <text x="230" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">Docker container · port 7860</text>
  <text x="230" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">FastAPI backend · PyTorch · RDKit · ESM-2 · FAISS</text>
  <text x="230" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#378ADD">saitejasrivilli-molecularml-platform.hf.space</text>

  <!-- Vercel -->
  <rect x="470" y="372" width="400" height="110" rx="12" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="670" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Vercel</text>
  <text x="670" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">React frontend · CDN edge network</text>
  <text x="670" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">Vite build · auto-deploy on push</text>
  <text x="670" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D85A30">molecularml-frontend.vercel.app</text>

  <!-- arrows down to browser -->
  <line x1="230" y1="482" x2="230" y2="520" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="670" y1="482" x2="670" y2="520" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M230 522 L230 545 L380 545" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M670 522 L670 545 L520 545" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── TIER 4: Browser ── -->
  <rect x="310" y="522" width="280" height="66" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="450" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">User browser</text>
  <text x="450" y="568" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">React app · 3 tabs · REST API calls</text>

  <!-- arrow down to API -->
  <line x1="450" y1="588" x2="450" y2="626" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── TIER 5: API Endpoints ── -->
  <rect x="30" y="626" width="840" height="220" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="450" y="652" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#042C53">FastAPI backend — endpoints</text>

  <!-- /predict -->
  <rect x="58" y="668" width="238" height="154" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="177" y="694" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">POST /predict</text>
  <text x="177" y="714" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Input: SMILES string</text>
  <text x="177" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">RDKit → Morgan fingerprints</text>
  <text x="177" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">PyTorch MLP inference</text>
  <text x="177" y="768" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Output: solubility, lipophilicity,</text>
  <text x="177" y="784" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">toxicity + Lipinski Rule of Five</text>
  <text x="177" y="808" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1D9E75">Molecular property prediction</text>

  <!-- /search -->
  <rect x="331" y="668" width="238" height="154" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="450" y="694" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#26215C">POST /search</text>
  <text x="450" y="714" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">Input: amino acid sequence</text>
  <text x="450" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">ESM-2 protein embeddings</text>
  <text x="450" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">FAISS cosine similarity search</text>
  <text x="450" y="768" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">Output: top-k similar proteins</text>
  <text x="450" y="784" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">UniProt ID + similarity score</text>
  <text x="450" y="808" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">Protein similarity search</text>

  <!-- /metrics -->
  <rect x="604" y="668" width="238" height="154" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="723" y="694" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#412402">GET /metrics + /health</text>
  <text x="723" y="714" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">P50 / P95 / P99 latency</text>
  <text x="723" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">Request counts per endpoint</text>
  <text x="723" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">Success / error rates</text>
  <text x="723" y="768" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">Model load status + uptime</text>
  <text x="723" y="784" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">Recent request log</text>
  <text x="723" y="808" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#BA7517">Observability dashboard</text>

  <!-- Tech stack footer -->
  <rect x="30" y="866" width="840" height="54" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="450" y="889" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">Tech stack</text>
  <text x="450" y="908" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Python · FastAPI · PyTorch · RDKit · HuggingFace ESM-2 · FAISS · React · Vite · Docker · GitHub Actions · Helm · AWS CloudWatch</text>

  <!-- Legend -->
  <rect x="30" y="940" width="840" height="120" rx="8" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="450" y="962" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">Legend</text>
  <rect x="60" y="978" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="82" y="990" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Infrastructure / neutral</text>
  <rect x="230" y="978" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="252" y="990" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">CI/CD · protein search</text>
  <rect x="400" y="978" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="422" y="990" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">ML pipelines · tests</text>
  <rect x="570" y="978" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="592" y="990" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Backend / cloud</text>
  <rect x="700" y="978" width="14" height="14" rx="3" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="722" y="990" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Frontend</text>
  <rect x="60" y="1010" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="82" y="1022" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Monitoring / observability</text>
  <line x1="235" y1="1017" x2="270" y2="1017" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="278" y="1022" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Test gate (passes before deploy)</text>
  <line x1="500" y1="1017" x2="535" y2="1017" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="543" y="1022" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Data / request flow</text>
</svg>
