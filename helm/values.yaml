replicaCount: 2

image:
  repository: molecularml-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 7860

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: molecularml.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 7860
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 7860
  initialDelaySeconds: 90
  periodSeconds: 10

env:
  - name: LOG_LEVEL
    value: "INFO"
